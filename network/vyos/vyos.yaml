local-asn: 395909

as-set-limit:
  member-limit: 250
  prefix-limit: 50
  large-as-list: []

keepup-as-list: []

blacklist:
  asn:
    - 21158
    - 216056
  as-set:
    - AS216056:AS-VIRTUALIZE
  prefix4:
    - 193.109.132.0/23
  prefix6:
    - 2001:678:de0::/48

# Shared, repeated definitions live here and are pulled into the routers below
# via YAML anchors (*name). The generator ignores the `template` key itself.
template:
  as-sets:
    # PassGFW: routes ORIGINATED by these ASNs bypass the GFW filter (origin
    # match, `bgp_path.last ~ ...` — old FRR regex was all `<asn>$`).
    passgfw: &passgfw
      - 15133 # Edgecast
      - 54113 # Fastly
      - 20940 # Akamai
      - 3462 # HiNet
      - 15169 # Google
      - 16550
      - 16591
      - 19527
      - 36040
      - 43515
      - 139070
      - 139190
      - 396982
      - 62014 # Telegram
      - 62041
      - 59930
      - 13414 # Twitter
      - 35995
      - 63179
      - 13335 # Cloudflare
      - 4694 # IDC Frontier
      - 14618 # Amazon
      - 16509
      - 14907 # Wikimedia
      - 32934 # Meta
      - 54115
      - 63293
  prefix-sets:
    # My own RIPE allocation; dropped on import/export so it never loops back.
    my-ripe: &my_ripe
      - "2a0b:71c0::/29"
  filters:
    # Drop my own RIPE space, then accept only PassGFW-origin routes, deny rest.
    # Used for both import (upstream/routeserver) and export (iBGP) — same code.
    gfw-ripe: &gfw_ripe |
      if net ~ autogen_my_ripe_2a0b_71c0 then reject;
      if bgp_path.last ~ autogen_as_passgfw then accept;
      reject;
    # Export only my local-ASN prefixes (iBGP backbone announces own space only).
    local-export: &local_export |
      if net ~ autogen_local_asn_prefix4 then accept;
      if net ~ autogen_local_asn_prefix6 then accept;
      reject;
    # Deny everything (was a lone `- action: deny`).
    deny-all: &deny_all |
      reject;

router:
  - name: edge.pku.395909.atlas.projectk.org
    # router-id was implicit (DNS) before; set from the old kernel ipv4 bgp src.
    # Remove this line to fall back to DNS resolution.
    router-id: 192.168.3.1
    defines:
      as-sets:
        AUTOGEN-AS-PassGFW: *passgfw
      prefix-sets:
        AUTOGEN-MY-RIPE-2a0b-71c0: *my_ripe
    protocols:
      rpki:
        - server: rtr.rpki.cloudflare.com
          port: 8282
          preference: 10
      kernel:
        ipv4:
          pre-export-accept: |
            if source = RTS_BGP then krt_prefsrc = 192.168.3.1;
        ipv6:
          pre-export-accept: |
            if source = RTS_BGP then krt_prefsrc = 2602:f93b:a41:3::1;
      bgp:
        ibgp:
          - neighbor-address: wg1242
            extended-nexthop: true
            pre-import-accept: *gfw_ripe
            pre-export-accept: *local_export
        upstream: []
        routeserver: []
        peer: []
        downstream: []

