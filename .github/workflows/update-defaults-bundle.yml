name: Update Defaults Bundle

on:
    push:
        branches: [main]
    workflow_dispatch:

permissions:
    contents: write

jobs:
    update-bundle:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout config repo
              uses: actions/checkout@v4

            - name: Checkout scripts repo
              uses: actions/checkout@v4
              with:
                  repository: kawaiinetworks/as27523-vyos-scripts
                  path: scripts

            - name: Setup Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.10"

            - name: Install dependencies
              run: pip install pyyaml requests aggregate-prefixes

            - name: Build defaults bundle
              run: python scripts/configure/save-cache.py . --defaults-bundle --scripts-dir scripts

            - name: Commit and push
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add cache/
                  if git diff --cached --quiet; then
                    echo "No changes to commit"
                  else
                    git commit -m "chore: update defaults bundle [automated]"
                    git push
                  fi
